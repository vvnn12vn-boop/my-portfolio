<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ثبت‌نام | مدیریت وظایف</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/dist/font-face.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card row g-0">
            <div class="col-lg-5 d-none d-lg-flex">
                <div class="auth-side">
                    <div class="auth-mark"><i class="bi bi-person-plus"></i></div>
                    <h2 class="mt-3 fw-bold">به ما بپیوندید</h2>
                    <p class="mt-2 opacity-75">
                        در چند ثانیه یک حساب بساز و مدیریت وظایفت رو شروع کن.
                    </p>
                    <div class="auth-eyebrow">setup time: ~30s</div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="auth-form-col">
                    <h3 class="fw-bold mb-1">ساخت حساب کاربری</h3>
                    <p class="text-muted mb-4">اطلاعات زیر را تکمیل کنید</p>

                    <div id="registerAlert" class="alert d-none" role="alert"></div>

                    <form id="registerForm" novalidate>
                        <div class="mb-3">
                            <label for="registerName" class="form-label">نام و نام خانوادگی</label>
                            <input type="text" class="form-control" id="registerName" placeholder="مثلاً یسنا مرادی">
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="mb-3">
                            <label for="registerEmail" class="form-label">ایمیل</label>
                            <input type="email" class="form-control" id="registerEmail" placeholder="you@example.com">
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="mb-3">
                            <label for="registerPassword" class="form-label">رمز عبور</label>
                            <div class="input-group has-validation">
                                <input type="password" class="form-control" id="registerPassword" placeholder="حداقل ۶ کاراکتر">
                                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="registerPassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                                <div class="invalid-feedback"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="registerConfirmPassword" class="form-label">تکرار رمز عبور</label>
                            <input type="password" class="form-control" id="registerConfirmPassword" placeholder="••••••••">
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="registerTerms">
                            <label class="form-check-label" for="registerTerms">
                                قوانین و شرایط استفاده را می‌پذیرم
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">ثبت‌نام</button>
                    </form>

                    <p class="text-center mt-4 mb-0">
                        قبلاً ثبت‌نام کرده‌اید؟ <a href="login.html" class="fw-semibold">وارد شوید</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="storage.js"></script>
    <script src="auth.js"></script>
</body>
</html>
