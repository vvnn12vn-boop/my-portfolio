<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>وظایف | مدیریت وظایف</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/dist/font-face.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="app-wrapper">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-close d-lg-none">
                <button class="btn btn-sm" id="sidebarClose"><i class="bi bi-x-lg"></i></button>
            </div>
            <a href="index.html" class="brand">
                <span class="brand-mark"><i class="bi bi-check2-square"></i></span>
                مدیریت وظایف
            </a>
            <div class="brand-sub">task-manager · local</div>
            <nav class="nav flex-column">
                <a class="nav-link" href="index.html"><i class="bi bi-grid-1x2"></i> داشبورد</a>
                <a class="nav-link active" href="tasks.html"><i class="bi bi-list-task"></i> وظایف</a>
                <hr class="nav-divider">
                <a class="nav-link" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> خروج</a>
            </nav>
            <div class="sidebar-foot">
                <span>v1.0 · offline-first</span>
                <a href="#" id="resetDataBtn" title="پاک‌کردن همه‌ی داده‌ها"><i class="bi bi-arrow-counterclockwise"></i></a>
            </div>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-sm btn-outline-secondary d-lg-none" id="sidebarToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    <h5 class="mb-0">وظایف</h5>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-sm btn-outline-secondary" id="themeToggle">
                        <i class="bi bi-moon-stars-fill"></i>
                    </button>
                    <span class="text-muted small d-none d-sm-inline">خوش آمدی، <span data-user-name class="fw-semibold text-body"></span></span>
                    <span class="avatar-chip d-none d-sm-flex" data-user-initial>·</span>
                </div>
            </header>

            <main class="page-body">

                <div class="row g-3 mb-4">
                    <div class="col-6 col-lg-3">
                        <div class="stat-card bg-pending">
                            <div class="stat-eyebrow">در انتظار</div>
                            <div class="stat-number" id="countPending">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="stat-card bg-progress">
                            <div class="stat-eyebrow">در حال انجام</div>
                            <div class="stat-number" id="countInProgress">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="stat-card bg-completed">
                            <div class="stat-eyebrow">انجام‌شده</div>
                            <div class="stat-number" id="countCompleted">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="stat-card bg-total">
                            <div class="stat-eyebrow">مجموع</div>
                            <div class="stat-number" id="countTotal">0</div>
                        </div>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row g-2 align-items-center">
                            <div class="col-md-4">
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                                    <input type="text" class="form-control border-start-0" id="searchInput" placeholder="جستجوی وظیفه...">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select" id="statusFilter">
                                    <option value="">همه وضعیت‌ها</option>
                                    <option value="pending">در انتظار</option>
                                    <option value="in-progress">در حال انجام</option>
                                    <option value="completed">انجام‌شده</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select" id="priorityFilter">
                                    <option value="">همه اولویت‌ها</option>
                                    <option value="low">کم</option>
                                    <option value="medium">متوسط</option>
                                    <option value="high">بالا</option>
                                </select>
                            </div>
                            <div class="col-md-1">
                                <button class="btn btn-outline-secondary w-100" id="clearFiltersBtn" title="پاک کردن فیلترها">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </div>
                            <div class="col-md-1 text-end">
                                <button class="btn btn-primary w-100" id="addTaskBtn" title="افزودن وظیفه">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead>
                                <tr>
                                    <th style="width:40px"></th>
                                    <th>عنوان</th>
                                    <th style="width:110px">اولویت</th>
                                    <th style="width:130px">وضعیت</th>
                                    <th style="width:160px">سررسید</th>
                                    <th style="width:100px" class="text-end">عملیات</th>
                                </tr>
                            </thead>
                            <tbody id="tasksTableBody"></tbody>
                        </table>
                    </div>
                    <div id="emptyState" class="empty-state d-none">
                        <div class="empty-icon"><i class="bi bi-inbox"></i></div>
                        <p class="mb-0">هیچ وظیفه‌ای یافت نشد</p>
                        <button type="button" class="btn btn-sm btn-primary mt-2" onclick="document.getElementById('addTaskBtn').click()">
                            <i class="bi bi-plus-lg"></i> افزودن وظیفه
                        </button>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- مودال افزودن/ویرایش وظیفه -->
    <div class="modal fade" id="taskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="taskForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="taskModalLabel">افزودن وظیفه</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="taskId">
                        <div class="mb-3">
                            <label for="taskTitle" class="form-label">عنوان</label>
                            <input type="text" class="form-control" id="taskTitle" required>
                            <div class="invalid-feedback">عنوان الزامی است.</div>
                        </div>
                        <div class="mb-3">
                            <label for="taskDescription" class="form-label">توضیحات</label>
                            <textarea class="form-control" id="taskDescription" rows="3"></textarea>
                        </div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label for="taskDueDate" class="form-label">سررسید</label>
                                <input type="date" class="form-control" id="taskDueDate">
                            </div>
                            <div class="col-6">
                                <label for="taskPriority" class="form-label">اولویت</label>
                                <select class="form-select" id="taskPriority">
                                    <option value="low">کم</option>
                                    <option value="medium" selected>متوسط</option>
                                    <option value="high">بالا</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-3">
                            <label for="taskStatus" class="form-label">وضعیت</label>
                            <select class="form-select" id="taskStatus">
                                <option value="pending">در انتظار</option>
                                <option value="in-progress">در حال انجام</option>
                                <option value="completed">انجام‌شده</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">انصراف</button>
                        <button type="submit" class="btn btn-primary">ذخیره</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- مودال حذف -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">حذف وظیفه</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    آیا از حذف این وظیفه مطمئن هستید؟ این عملیات قابل بازگشت نیست.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">انصراف</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">حذف</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="storage.js"></script>
    <script src="theme.js"></script>
    <script src="tasks.js"></script>
</body>
</html>
