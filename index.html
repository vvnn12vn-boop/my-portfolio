<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>داشبورد | مدیریت وظایف</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/dist/font-face.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="app-wrapper">

        <!-- سایدبار -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-close d-lg-none">
                <button class="btn btn-sm" id="sidebarClose"><i class="bi bi-x-lg"></i></button>
            </div>
            <a href="index.html" class="brand">
                <span class="brand-mark"><i class="bi bi-check2-square"></i></span>
                مدیریت وظایف
            </a>
            <div class="brand-sub">task-manager · local</div>
            <nav class="nav flex-column">
                <a class="nav-link active" href="index.html"><i class="bi bi-grid-1x2"></i> داشبورد</a>
                <a class="nav-link" href="tasks.html"><i class="bi bi-list-task"></i> وظایف</a>
                <hr class="nav-divider">
                <a class="nav-link" href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> خروج</a>
            </nav>
            <div class="sidebar-foot">
                <span>v1.0 · offline-first</span>
                <a href="#" id="resetDataBtn" title="پاک‌کردن همه‌ی داده‌ها"><i class="bi bi-arrow-counterclockwise"></i></a>
            </div>
        </aside>

        <div class="main-content">
            <!-- نوار بالا -->
            <header class="topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-sm btn-outline-secondary d-lg-none" id="sidebarToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    <h5 class="mb-0">داشبورد</h5>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-sm btn-outline-secondary" id="themeToggle">
                        <i class="bi bi-moon-stars-fill"></i>
                    </button>
                    <span class="text-muted small d-none d-sm-inline">خوش آمدی، <span data-user-name class="fw-semibold text-body"></span></span>
                    <span class="avatar-chip d-none d-sm-flex" data-user-initial>·</span>
                </div>
            </header>

            <main class="page-body">

                <div class="row g-3 mb-4">
                    <div class="col-6 col-lg-3">
                        <div class="stat-card bg-total">
                            <i class="bi bi-layers stat-icon"></i>
                            <div class="stat-eyebrow">کل وظایف</div>
                            <div class="stat-number" id="statTotal">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="stat-card bg-pending">
                            <i class="bi bi-hourglass-split stat-icon"></i>
                            <div class="stat-eyebrow">در انتظار</div>
                            <div class="stat-number" id="statPending">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="stat-card bg-progress">
                            <i class="bi bi-arrow-repeat stat-icon"></i>
                            <div class="stat-eyebrow">در حال انجام</div>
                            <div class="stat-number" id="statInProgress">0</div>
                        </div>
                    </div>
                    <div class="col-6 col-lg-3">
                        <div class="stat-card bg-completed">
                            <i class="bi bi-check-circle stat-icon"></i>
                            <div class="stat-eyebrow">انجام‌شده</div>
                            <div class="stat-number" id="statCompleted">0</div>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-lg-5">
                        <div class="card h-100">
                            <div class="card-body">
                                <h6 class="card-title mb-3">وضعیت وظایف</h6>
                                <div class="chart-box">
                                    <canvas id="statusChart"></canvas>
                                </div>
                                <div id="chartEmpty" class="empty-state py-4 d-none">
                                    <div class="empty-icon"><i class="bi bi-pie-chart"></i></div>
                                    <p class="mb-0 small">هنوز داده‌ای برای نمایش نیست</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <div class="card h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h6 class="card-title mb-0">نزدیک‌ترین سررسیدها</h6>
                                    <span class="tag tag-brick">
                                        <span id="statOverdue" class="mono">0</span> دیرکرد
                                    </span>
                                </div>
                                <ul class="list-group list-group-flush" id="upcomingList"></ul>
                                <a href="tasks.html" class="btn btn-sm btn-outline-primary mt-3">مشاهده همه وظایف</a>
                            </div>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="storage.js"></script>
    <script src="theme.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
