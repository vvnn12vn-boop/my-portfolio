<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Vazirmatn:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>رزرو صندلی سینما · Cinema Seat Booking</title>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand__icon" aria-hidden="true">🎬</span>
          <span class="brand__name" data-i18n="brandName">رزرو صندلی سینما</span>
        </div>
        <button id="langToggle" class="lang-toggle" type="button" aria-label="Change language / تغییر زبان">
          <span class="lang-toggle__opt is-active" data-lang-opt="fa">فا</span>
          <span class="lang-toggle__divider">/</span>
          <span class="lang-toggle__opt" data-lang-opt="en">EN</span>
        </button>
      </header>

      <main class="layout">
        <section class="panel movies-panel" aria-label="Movie selection">
          <div class="panel__head">
            <span class="eyebrow mono" data-i18n="nowShowingEyebrow">اکران این هفته</span>
            <h2 class="section-title" data-i18n="chooseMovie">یک فیلم انتخاب کنید</h2>
          </div>
          <div class="movie-list" id="movieList" role="radiogroup" aria-label="Movies"></div>
        </section>

        <section class="panel theater-panel">
          <div class="screen-wrap">
            <div class="screen"></div>
            <span class="screen__label mono" data-i18n="screenLabel">پرده نمایش</span>
          </div>

          <div class="seat-map" id="seatMap"></div>

          <ul class="legend">
            <li>
              <span class="legend__seat legend__seat--available"></span>
              <span data-i18n="legendAvailable">آزاد</span>
            </li>
            <li>
              <span class="legend__seat legend__seat--selected"></span>
              <span data-i18n="legendSelected">انتخاب‌شده</span>
            </li>
            <li>
              <span class="legend__seat legend__seat--occupied"></span>
              <span data-i18n="legendOccupied">پر شده</span>
            </li>
          </ul>
        </section>
      </main>

      <footer class="summary-bar">
        <div class="summary-bar__info">
          <div class="summary-bar__stat">
            <span class="summary-bar__label" data-i18n="seatsLabel">صندلی انتخاب‌شده</span>
            <strong id="seatCount">0</strong>
          </div>
          <div class="summary-bar__stat">
            <span class="summary-bar__label" data-i18n="totalLabel">مبلغ قابل پرداخت</span>
            <strong>$<span id="totalPrice">0</span></strong>
          </div>
        </div>
        <button id="confirmBtn" class="confirm-btn" type="button" disabled>
          <span data-i18n="confirmBtn">تایید و رزرو بلیت</span>
        </button>
      </footer>
    </div>

    <div class="modal-overlay" id="modalOverlay" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal__icon" aria-hidden="true">✓</div>
        <h3 id="modalTitle" data-i18n="modalTitle">رزرو با موفقیت انجام شد</h3>
        <p class="modal__details" id="modalDetails"></p>
        <button id="modalClose" class="confirm-btn" type="button" data-i18n="modalClose">رزرو جدید</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
