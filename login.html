<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ورود | مدیریت وظایف</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/dist/font-face.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card row g-0">
            <div class="col-lg-5 d-none d-lg-flex">
                <div class="auth-side">
                    <div class="auth-mark"><i class="bi bi-check2-square"></i></div>
                    <h2 class="mt-3 fw-bold">مدیریت وظایف</h2>
                    <p class="mt-2 opacity-75">
                        وظایفت رو یک‌جا سازمان‌دهی کن، پیشرفت کارها رو دنبال کن و هیچ ددلاینی رو از دست نده.
                    </p>
                    <div class="auth-eyebrow">status: ready · local-first</div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="auth-form-col">
                    <h3 class="fw-bold mb-1">خوش آمدید</h3>
                    <p class="text-muted mb-4">برای ادامه وارد حساب کاربری خود شوید</p>

                    <div id="loginAlert" class="alert d-none" role="alert"></div>

                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">ایمیل</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com">
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">رمز عبور</label>
                            <div class="input-group has-validation">
                                <input type="password" class="form-control" id="loginPassword" placeholder="••••••••">
                                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="loginPassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                                <div class="invalid-feedback"></div>
                            </div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">من را به خاطر بسپار</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">ورود</button>
                    </form>

                    <div class="demo-hint mt-3">
                        حساب دمو: <span class="mono">admin@example.com</span> · رمز: <span class="mono">123456</span>
                    </div>

                    <p class="text-center mt-4 mb-0">
                        حساب کاربری ندارید؟ <a href="register.html" class="fw-semibold">ثبت‌نام کنید</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="storage.js"></script>
    <script src="auth.js"></script>
</body>
</html>
